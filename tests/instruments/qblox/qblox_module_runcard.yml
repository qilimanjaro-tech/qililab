name: qblox_module_runcard

instruments:
  - name: QBloxModule #The module is not registered so trying to use this runcard without doing so first will fail.
    alias: module
    out_offsets: [0.0, 0.1, 0.2, 0.3]
    awg_sequencers:
      - identifier: 0
        outputs: [3, 2]
        intermediate_frequency: 100000000.0
        gain_imbalance: 0.05
        phase_imbalance: 0.02
        hardware_modulation: true
        gain_i: 1.0
        gain_q: 1.0
        offset_i: 0.0
        offset_q: 0.0
      - identifier: 1
        outputs: [1, 0]
        intermediate_frequency: 50000000.0
        gain_imbalance: 0.0
        phase_imbalance: 0.0
        hardware_modulation: false
        gain_i: 0.5
        gain_q: 0.5
        offset_i: 0.1
        offset_q: 0.1
    filters:
      - output_id: 0
        exponential_amplitude: [0.31, 1, 0.1]
        exponential_time_constant: [200, 100, 0.5]
        exponential_state: [True, True, False]
        fir_coeff: [0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4, 0.4]
        fir_state: True

instrument_controllers:
  - name: qblox_cluster
    alias: cluster_controller_0
    reference_clock: internal
    connection:
      name: tcp_ip
      address: 192.168.1.20
    modules:
      - alias: module
        slot_id: 0
    reset: False